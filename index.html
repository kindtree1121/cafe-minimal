<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MINIMAL | Coffee & Space</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">THE MINIMAL</div>
        <nav>
            <ul>
                <li>ABOUT</li>
                <li>MENU</li>
                <li>ACCESS</li>
            </ul>
        </nav>
    </header>
<section class="access">
            <h2>Access</h2>
            <div class="access-container">
                <div class="map-wrapper">
                    <iframe 
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3241.7479754683745!2d139.707624!3d35.664758!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x60188ca152504851%3A0x6a08605c36398b65!2z6KGo5Y-C6YGT44OS44Or44K6!5e0!3m2!1sja!2sjp!4v1700000000000!5m2!1sja!2sjp" 
                        width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy">
                    </iframe>
                </div>
                <div class="access-info">
                    <p>〒150-0001 東京都渋谷区神宮前<br>表参道静寂ビル 1F</p>
                    <p>Open: 10:00 - 19:00<br>Closed: Tuesday</p>
                </div>
            </div>
        </section>
   <main>
        <section class="hero-cafe">
            <div class="hero-content">
                <h1>静寂を、<br class="sp-only">一杯のコーヒーと。</h1>
                <p class="hero-sub">こだわりの豆と、削ぎ落とされた空間。</p>
            </div>
        </section>

       <section class="concept">
            <h2>Our Concept</h2>
            <p>
                都会の喧騒から離れ、自分を取り戻す場所。<br class="sp-only">
                私たちは、一杯のコーヒーを通じて<br class="sp-only">
                「余白」を提供します。
            </p>
        </section>

        <section class="menu">
            <h2>Coffee Menu</h2>
            <div class="menu-container">
                <div class="menu-item">
                    <h3>Hand Drip</h3>
                    <p>¥650</p>
                </div>
                <div class="menu-item">
                    <h3>Cafe Latte</h3>
                    <p>¥700</p>
                </div>
                <div class="menu-item">
                    <h3>Espresso</h3>
                    <p>¥550</p>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
