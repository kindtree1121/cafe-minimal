<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MINIMAL | Coffee & Space</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">THE MINIMAL</div>
        <nav>
            <ul>
                <li>ABOUT</li>
                <li>MENU</li>
                <li>ACCESS</li>
            </ul>
        </nav>
    </header>

   <main>
        <section class="hero-cafe">
            <div class="hero-content">
                <h1>静寂を、<br class="sp-only">一杯のコーヒーと。</h1>
                <p class="hero-sub">こだわりの豆と、削ぎ落とされた空間。</p>
            </div>
        </section>

       <section class="concept">
            <h2>Our Concept</h2>
            <p>
                都会の喧騒から離れ、自分を取り戻す場所。<br class="sp-only">
                私たちは、一杯のコーヒーを通じて<br class="sp-only">
                「余白」を提供します。
            </p>
        </section>

        <section class="menu">
            <h2>Coffee Menu</h2>
            <div class="menu-container">
                <div class="menu-item">
                    <h3>Hand Drip</h3>
                    <p>¥650</p>
                </div>
                <div class="menu-item">
                    <h3>Cafe Latte</h3>
                    <p>¥700</p>
                </div>
                <div class="menu-item">
                    <h3>Espresso</h3>
                    <p>¥550</p>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
